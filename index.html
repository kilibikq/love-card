<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>💌</title>

<style>
html, body {
    margin:0;
    height:100%;
    background:#0e1621;
    font-family:Arial;
    overflow:hidden;
    color:white;
}

/* 📩 уведомление */
.notify {
    position:fixed;
    top:-100px;
    left:0;
    right:0;
    margin:auto;
    width:90%;
    max-width:420px;
    background:#1f1f1f;
    border-radius:12px;
    padding:12px;
    transition:0.5s;
    z-index:999;
    text-align:center;
}

.notify.show { top:10px; }

/* 💬 чат */
.chat {
    display:none;
    flex-direction:column;
    height:100vh;
}

.topbar {
    height:60px;
    background:#17212b;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:0 15px;
}

.title { font-weight:bold; }
.status { font-size:12px; color:#7aa2c0; }

.messages {
    flex:1;
    padding:15px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
}

.msg {
    background:#2b5278;
    padding:8px 12px;
    border-radius:14px;
    max-width:75%;
    font-size:14px;
    margin-top:8px;
    opacity:0;
    transform:translateY(8px);
    transition:0.35s;
}

.msg.show {
    opacity:1;
    transform:translateY(0);
}

/* 🔘 */
.next-btn {
    display:none;
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#2b5278;
    padding:10px 18px;
    border-radius:20px;
    cursor:pointer;
}

/* 🌙 затемнение */
.fade {
    position:fixed;
    inset:0;
    background:black;
    opacity:0;
    transition:1.5s;
    z-index:50;
}

.fade.show { opacity:1; }

/* ❤️ финал */
.final {
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:black;
    z-index:60;
}

.heart {
    font-size:90px;
    animation:pulse 1.2s infinite;
}

@keyframes pulse {
    0% { transform:scale(1); }
    50% { transform:scale(1.15); }
    100% { transform:scale(1); }
}

.text {
    position:absolute;
    font-size:22px;
    opacity:0;
    transition:1s;
}

.top { top:25%; }
.bottom { bottom:25%; }

.show { opacity:1 !important; }

</style>
</head>

<body>

<!-- 📩 -->
<div class="notify" id="notify">Telegram — новое сообщение 💌</div>

<!-- 💬 -->
<div class="chat" id="chat">
    <div class="topbar">
        <div class="title">Darling❤️</div>
        <div class="status" id="status">в сети</div>
    </div>
    <div class="messages" id="messages"></div>
</div>

<!-- 🔘 -->
<div class="next-btn" id="nextBtn">Далее</div>

<!-- 🌙 -->
<div class="fade" id="fade"></div>

<!-- ❤️ -->
<div class="final" id="final">
    <div class="text top" id="top">С днём рождения</div>
    <div class="heart">❤️</div>
    <div class="text bottom" id="bottom">Любимая</div>
</div>

<script>

const notify = document.getElementById("notify");
const chat = document.getElementById("chat");
const messages = document.getElementById("messages");
const status = document.getElementById("status");
const nextBtn = document.getElementById("nextBtn");

let i = 0;

/* 💬 ТВОЙ ГОТОВЫЙ ТЕКСТ */
const msgs = [
"Лерочка…",
"Слушай… сегодня твой день ✨",
"Я не буду пытаться сказать что-то слишком идеальное — это, наверное, и не нужно",
"Я просто рад, что ты есть в моей жизни… правда",
"С тобой у меня много спокойствия и тепла внутри",
"Ты очень особенная для меня, даже если я не всегда умею это нормально показать",
"И я правда ценю каждое твоё появление в моей жизни",
"Я хочу, чтобы у тебя было больше дней, где тебе легко, спокойно и хорошо",
"Чтобы ты чаще улыбалась просто так, без причины",
"Ты намного сильнее и лучше, чем иногда сама о себе думаешь",
"И если честно… мне просто важно, чтобы ты была счастлива",
"Сегодня. И всегда",
"С днём рождения тебя 🎂",
"И что бы не случилось, знай — я рядом ❤️"
];

/* 📩 уведомление */
setTimeout(()=>notify.classList.add("show"),8000);

/* 💥 старт */
notify.onclick = () => {

notify.style.display="none";
chat.style.display="flex";

startChat();
};

/* 💬 чат */
function startChat(){

function next(){

if(i >= msgs.length){
nextBtn.style.display="block";
return;
}

status.innerText="печатает…";

setTimeout(()=>{

status.innerText="в сети";

const d = document.createElement("div");
d.className = "msg";
d.innerText = msgs[i];

messages.appendChild(d);
setTimeout(()=>d.classList.add("show"),50);

messages.scrollTop = messages.scrollHeight;

i++;
setTimeout(next,900);

},1000);

}

next();
}

/* 🔘 финал */
nextBtn.onclick = () => {

document.getElementById("fade").classList.add("show");

setTimeout(()=>{
document.getElementById("final").style.display="flex";
},1200);

setTimeout(()=>{
document.getElementById("top").classList.add("show");
},2000);

setTimeout(()=>{
document.getElementById("bottom").classList.add("show");
},2800);

};

</script>

</body>
</html>
