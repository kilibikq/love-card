<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>С Днем Рождения ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at top, #1f1f2e, #0f172a 80%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
    color: white;
    position: relative;
}

/* контейнер */
.container {
    text-align: center;
    z-index: 2;
}

/* сердце */
.heart {
    font-size: 85px;
    cursor: pointer;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
}

/* текст */
.message {
    font-size: 36px;
    margin-top: 20px;
    min-height: 50px;
    text-shadow: 0 0 10px rgba(255,200,200,0.6);
}

.subtext {
    font-size: 18px;
    margin-top: 10px;
    opacity: 0;
    transition: opacity 1s;
    color: #ffdede;
}

.cake {
    font-size: 85px;
    margin-top: 20px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 1s ease;
}

.show {
    opacity: 1;
    transform: translateY(0);
}

/* 🌌 частицы */
.particle {
    position: fixed;
    width: 4px;
    height: 4px;
    background: rgba(255,255,255,0.9);
    border-radius: 50%;
    top: 100vh;
    left: 50vw;
    pointer-events: none;
    animation: floatUp linear forwards;
    box-shadow: 0 0 6px rgba(255,255,255,0.8);
    z-index: 0;
}

@keyframes floatUp {
    0% {
        transform: translateY(0);
        opacity: 0;
    }
    10% { opacity: 1; }
    100% {
        transform: translateY(-120vh);
        opacity: 0;
    }
}
</style>

</head>

<body>

<div class="container">
    <div class="heart" id="heart">❤️</div>
    <div class="message" id="text"></div>
    <div class="subtext" id="sub">ты — самое лучшее, что случилось со мной ❤️</div>
    <div class="cake" id="cake">🎂</div>
</div>

<script>
const text = "С днем рождения, любимая ❤️";

let started = false;

/* печать текста */
function typeText(el, txt, i = 0) {
    if (i === 0) el.textContent = "";

    if (i < txt.length) {
        el.textContent += txt[i];
        setTimeout(() => typeText(el, txt, i + 1), 60);
    } else {
        document.getElementById("sub").style.opacity = 1;
        document.getElementById("cake").classList.add("show");
    }
}

/* 🌌 частицы */
function spawnParticle() {
    const p = document.createElement("div");
    p.className = "particle";

    p.style.left = Math.random() * 100 + "vw";

    const size = 2 + Math.random() * 4;
    p.style.width = size + "px";
    p.style.height = size + "px";

    const duration = 3 + Math.random() * 3;
    p.style.animationDuration = duration + "s";

    document.body.appendChild(p);

    setTimeout(() => p.remove(), duration * 1000);
}

/* постоянный поток */
setInterval(spawnParticle, 60);

/* запуск */
function start() {
    if (started) return;
    started = true;

    document.getElementById("heart").style.opacity = 0.5;

    typeText(document.getElementById("text"), text);
}

document.getElementById("heart").onclick = start;
</script>

</body>
</html>
