<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>💙</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0e1621;
    font-family: Arial, sans-serif;
    overflow: hidden;
    color: white;
}

/* 🎮 ИГРА */
.game {
    position: absolute;
    inset: 0;
}

.score {
    position: fixed;
    top: 15px;
    left: 15px;
    font-size: 16px;
    z-index: 5;
}

.drop {
    position: absolute;
    font-size: 28px;
    cursor: pointer;
    animation: fall linear forwards;
}

@keyframes fall {
    from { transform: translateY(-50px); }
    to { transform: translateY(110vh); }
}

/* 📩 ANDROID УВЕДОМЛЕНИЕ */
.notify {
    position: fixed;
    top: -100px;
    left: 0;
    right: 0;
    margin: auto;
    width: 95%;
    max-width: 420px;

    background: #1f1f1f;
    border-radius: 12px;
    padding: 12px;

    display: flex;
    gap: 10px;
    align-items: center;

    box-shadow: 0 10px 25px rgba(0,0,0,0.5);

    transition: 0.5s;
    cursor: pointer;
    z-index: 20;
}

.notify.show {
    top: 10px;
}

/* логотип */
.logo {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #2AABEE;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
}

/* текст уведомления */
.notify-text {
    display: flex;
    flex-direction: column;
}

.notify-title {
    font-weight: bold;
}

.notify-sub {
    font-size: 13px;
    color: #aaa;
}

/* 💬 ЧАТ */
.chat {
    display: none;
    flex-direction: column;
    height: 100vh;
}

.topbar {
    height: 60px;
    background: #17212b;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 15px;
}

.title { font-weight: bold; }
.status { font-size: 12px; color: #7aa2c0; }

.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    padding-bottom: 140px;

    display: flex;
    flex-direction: column;
    align-items: flex-start;
}

.msg {
    background: #2b5278;
    padding: 10px 14px;
    border-radius: 16px;

    max-width: 75%;
    margin-top: 10px;

    opacity: 0;
    transform: translateY(10px);
    transition: 0.4s;
}

.msg.show {
    opacity: 1;
    transform: translateY(0);
}

/* подарок */
.gift {
    font-size: 50px;
    text-align: center;
    margin-top: 30px;
    opacity: 0;
    transition: 0.6s;
}
.gift.show { opacity: 1; }

</style>
</head>

<body>

<!-- 🎮 ИГРА -->
<div class="score">💖: <span id="score">0</span></div>
<div class="game" id="game"></div>

<!-- 📩 УВЕДОМЛЕНИЕ -->
<div class="notify" id="notify">
    <div class="logo">✈️</div>
    <div class="notify-text">
        <div class="notify-title">Telegram</div>
        <div class="notify-sub">Darling❤️: новое сообщение 💌</div>
    </div>
</div>

<!-- 💬 ЧАТ -->
<div class="chat" id="chat">
    <div class="topbar">
        <div class="title">Darling❤️</div>
        <div class="status" id="status">в сети</div>
    </div>

    <div class="messages" id="messages"></div>
</div>

<script>

/* 🎮 ИГРА */
let score = 0;
const game = document.getElementById("game");

function spawnHeart() {
    const el = document.createElement("div");
    el.className = "drop";
    el.innerText = "💖";

    el.style.left = Math.random() * 100 + "vw";
    const duration = 4 + Math.random() * 3;
    el.style.animationDuration = duration + "s";

    el.onclick = () => {
        score++;
        document.getElementById("score").innerText = score;
        el.remove();
    };

    game.appendChild(el);
    setTimeout(() => el.remove(), duration * 1000);
}

setInterval(spawnHeart, 700);

/* 📩 уведомление через 10 сек */
setTimeout(() => {
    document.getElementById("notify").classList.add("show");
}, 10000);

/* открыть чат */
document.getElementById("notify").onclick = () => {
    document.getElementById("game").style.display = "none";
    document.querySelector(".score").style.display = "none";
    document.getElementById("notify").style.display = "none";
    document.getElementById("chat").style.display = "flex";
    sendMessages();
};

/* 💬 сообщения */
const messages = [
"Лерочка..",
"Слушай… сегодня твой день",
"Я не буду пытаться сказать что-то слишком идеальное — да и, честно, это сейчас не главное",
"Я просто рад, что ты есть в моей жизни… правда🥰",
"Ты для меня очень особенная. Даже если я не всегда умею это нормально показать.",
"И знаешь… я правда хочу, чтобы у тебя было больше спокойных дней.",
"Таких, где тебе легко, где ты просто улыбаешься ни с чего 💖",
"И чтобы ты меньше сомневалась в себе — ты намного лучше, чем иногда думаешь 🌸",
"И если совсем честно… я просто хочу, чтобы ты была счастлива. По-настоящему.",
"Сегодня. И всегда ❤️",
"Поздравляю тебя с твоим 16 днем рождения, котенок💋"
];

const statusEl = document.getElementById("status");

function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function scrollDown() {
    const box = document.getElementById("messages");
    setTimeout(() => box.scrollTop = box.scrollHeight, 120);
}

function sendMessages() {
    let i = 0;

    function next() {
        if (i >= messages.length) {
            showGift();
            return;
        }

        statusEl.innerText = "печатает…";

        setTimeout(() => {

            statusEl.innerText = "в сети";

            const msg = document.createElement("div");
            msg.className = "msg";
            msg.innerText = messages[i];

            document.getElementById("messages").appendChild(msg);

            setTimeout(() => msg.classList.add("show"), 60);

            scrollDown();
            i++;

            setTimeout(next, rand(2000, 3500));

        }, rand(2200, 4000));
    }

    next();
}

/* 🎁 подарок */
function showGift() {
    const gift = document.createElement("div");
    gift.className = "gift";
    gift.innerText = "🎁";

    document.getElementById("messages").appendChild(gift);

    setTimeout(() => {
        gift.classList.add("show");
        scrollDown();
    }, 300);
}

</script>

</body>
</html>
