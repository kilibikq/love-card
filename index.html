<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>💌</title>

<style>
html, body {
    margin:0;
    height:100%;
    background:#0e1621;
    font-family: Arial, sans-serif;
    overflow:hidden;
    color:white;
}

/* 📩 уведомление */
.notify {
    position:fixed;
    top:-120px;
    left:0;
    right:0;
    margin:auto;
    width:90%;
    max-width:420px;
    background:#1f1f1f;
    border-radius:12px;
    padding:12px;
    transition:0.6s;
    z-index:999;
    text-align:center;
}

.notify.show { top:15px; }

/* 💬 чат */
.chat {
    display:none;
    flex-direction:column;
    height:100vh;
}

.topbar {
    height:64px;
    background:#17212b;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:0 16px;
}

.title {
    font-weight:600;
    font-size:16px;
}

.status {
    font-size:12px;
    color:#7aa2c0;
}

/* 💬 сообщения */
.messages {
    flex:1;
    padding:18px 14px 110px 14px;
    overflow-y:auto;
    -webkit-overflow-scrolling: touch;

    display:flex;
    flex-direction:column;
    gap:10px;

    box-sizing:border-box;
}

/* пузырь */
.msg {
    background:#2b5278;
    padding:12px 14px;
    border-radius:16px;

    font-size:16px;
    font-weight:500;
    line-height:1.35;

    max-width:85%;
    width:fit-content;
    word-wrap:break-word;

    opacity:0;
    transform:translateY(10px);
    transition:0.25s;
}

.msg.show {
    opacity:1;
    transform:translateY(0);
}

/* 🔘 */
.next-btn {
    display:none;
    position:fixed;
    bottom:22px;
    left:50%;
    transform:translateX(-50%);
    background:#2b5278;
    padding:12px 20px;
    border-radius:22px;
    font-size:15px;
    cursor:pointer;
    z-index:10;
}

/* ❤️ финал (УЛУЧШЕННЫЙ) */
.final {
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background: radial-gradient(circle at center, #111827, #000);
    z-index:60;
    overflow:hidden;
}

.final::before {
    content:"";
    position:absolute;
    inset:0;
    background: radial-gradient(circle, rgba(255,255,255,0.05), transparent 60%);
    animation: glowIn 2s ease forwards;
}

@keyframes glowIn {
    from { opacity:0; }
    to { opacity:1; }
}

.heart {
    font-size:90px;
    opacity:0;
    transform:scale(0.3);
    filter: drop-shadow(0 0 25px rgba(255, 60, 120, 0.4));
    animation: heartPop 1.2s ease forwards, pulse 1.6s infinite 1.2s;
}

@keyframes heartPop {
    to {
        opacity:1;
        transform:scale(1);
    }
}

@keyframes pulse {
    0% { transform:scale(1); }
    50% { transform:scale(1.12); }
    100% { transform:scale(1); }
}

.text {
    position:absolute;
    font-size:22px;
    opacity:0;
    transform:translateY(10px);
    transition:1s;
}

.top { top:30%; }
.bottom { bottom:30%; }

.show {
    opacity:1 !important;
    transform:translateY(0);
}

/* 💖 фоновые сердечки */
.bg-heart {
    position: fixed;
    top: 100vh;
    opacity: 0.2;
    animation: floatUp linear forwards;
    pointer-events: none;
    z-index: 0;
}

@keyframes floatUp {
    from { transform: translateY(0); }
    to { transform: translateY(-120vh); }
}

</style>
</head>

<body>

<div class="notify" id="notify">Telegram — новое сообщение 💌</div>

<div class="chat" id="chat">
    <div class="topbar">
        <div class="title">Darling❤️</div>
        <div class="status" id="status">в сети</div>
    </div>

    <div class="messages" id="messages"></div>
</div>

<div class="next-btn" id="nextBtn">Далее</div>

<div class="final" id="final">
    <div class="text top" id="top">С днём рождения</div>
    <div class="heart">❤️</div>
    <div class="text bottom" id="bottom">Моя любимая</div>
</div>

<script>

const notify = document.getElementById("notify");
const chat = document.getElementById("chat");
const messages = document.getElementById("messages");
const status = document.getElementById("status");
const nextBtn = document.getElementById("nextBtn");

let i = 0;

const msgs = [
"Милая…",
"Сегодня твой день ✨",
"Я просто хочу сказать тебе немного важного...",
"Ты для меня очень родная и близкая ❤️",
"С тобой мне спокойно и хорошо",
"Я люблю твою улыбку и твою искренность 😊",
"Иногда я не умею это красиво говорить, но я очень дорожу тобой",
"Я очень ценю, что у меня есть ты",
"Ты делаешь мои дни теплее ☀️",
"И я хочу, чтобы ты всегда чувствовала себя счастливой",
"Чтобы каждый день для тебя был прекрасным)",
"Не смотря ни на что знай, — я рядом, я всегда готов поддержать тебя.",
"Ты главное скажи :)",
"А да, к чему я веду..."
];

setTimeout(()=>notify.classList.add("show"),4000);

notify.onclick = () => {
notify.style.display="none";
chat.style.display="flex";
startChat();
};

function startChat(){

function next(){

if(i >= msgs.length){
nextBtn.style.display="block";
return;
}

status.innerText="печатает…";

setTimeout(()=>{

status.innerText="в сети";

const d = document.createElement("div");
d.className = "msg";
d.innerText = msgs[i];

messages.appendChild(d);
setTimeout(()=>d.classList.add("show"),50);

messages.scrollTop = messages.scrollHeight;

i++;
setTimeout(next,2500);

},900);

}

next();
}

/* 💥 ФИНАЛ (УЛУЧШЕННЫЙ) */
nextBtn.onclick = () => {

const final = document.getElementById("final");
final.style.display = "flex";

setTimeout(() => {
    document.getElementById("top").classList.add("show");
}, 900);

setTimeout(() => {
    document.getElementById("bottom").classList.add("show");
}, 1800);

};

/* 💖 сердечки */
function createHeart() {
    const h = document.createElement("div");
    h.innerText = "❤️";
    h.className = "bg-heart";

    h.style.left = Math.random() * 100 + "vw";
    h.style.fontSize = (14 + Math.random() * 12) + "px";
    h.style.animationDuration = (4 + Math.random() * 4) + "s";

    document.body.appendChild(h);

    setTimeout(() => h.remove(), 9000);
}

setInterval(createHeart, 300);

</script>

</body>
</html>
