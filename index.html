<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>💙</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    background: #0e1621;
    font-family: Arial;
    overflow: hidden;
    color: white;
}

/* 🎮 игра */
.game {
    position: fixed;
    inset: 0;
}

.game-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #7aa2c0;
    pointer-events: none;
}

.score {
    position: fixed;
    top: 15px;
    left: 15px;
    pointer-events: none;
}

.drop {
    position: absolute;
    font-size: 30px;
    cursor: pointer;
    animation: fall linear forwards;
}

@keyframes fall {
    from { transform: translateY(-50px); }
    to { transform: translateY(110vh); }
}

/* 📩 уведомление */
.notify {
    position: fixed;
    top: -100px;
    left: 0;
    right: 0;
    margin: auto;
    width: 90%;
    max-width: 420px;
    background: #1f1f1f;
    border-radius: 12px;
    padding: 12px;
    transition: 0.5s;
    z-index: 999;
}

.notify.show { top: 10px; }

/* 💬 чат */
.chat {
    display: none;
    flex-direction: column;
    height: 100vh;
}

.topbar {
    height: 60px;
    background: #17212b;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 15px;
}

.title { font-weight: bold; }
.status { font-size: 12px; color: #7aa2c0; }

.messages {
    flex: 1;
    padding: 15px;
    padding-bottom: 80px; /* 💥 фикс телефона */
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.msg {
    background: #2b5278;
    padding: 10px 14px;
    border-radius: 16px;
    max-width: 80%;
    margin-top: 10px;
    opacity: 0;
    transform: translateY(10px);
    transition: 0.4s;
}

.msg.show {
    opacity: 1;
    transform: translateY(0);
}

/* 💙 финал */
.final {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.9);
    text-align: center;
}

.final-heart {
    font-size: 80px;
    animation: pulse 1.2s infinite;
}

.final-top {
    position: absolute;
    top: 25%;
    font-size: 22px;
    opacity: 0;
    transform: translateY(-10px);
    transition: 1s;
}

.final-bottom {
    position: absolute;
    bottom: 25%;
    font-size: 22px;
    opacity: 0;
    transform: translateY(10px);
    transition: 1s;
}

.show {
    opacity: 1 !important;
    transform: translateY(0) !important;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<!-- игра -->
<div class="score">💖: <span id="score">0</span></div>
<div class="game" id="game"></div>
<div class="game-text">нажимай на сердечки 💖</div>

<!-- уведомление -->
<div class="notify" id="notify">Telegram — новое сообщение 💌</div>

<!-- чат -->
<div class="chat" id="chat">
    <div class="topbar">
        <div class="title">Darling❤️</div>
        <div class="status" id="status">в сети</div>
    </div>
    <div class="messages" id="messages"></div>
</div>

<!-- финал -->
<div class="final" id="final">
    <div class="final-top" id="top">С днём рождения</div>
    <div class="final-heart">❤️</div>
    <div class="final-bottom" id="bottom">Любимая</div>
</div>

<script>

let locked = false;
let score = 0;

const game = document.getElementById("game");
const notify = document.getElementById("notify");
const chat = document.getElementById("chat");
const messages = document.getElementById("messages");
const status = document.getElementById("status");

/* 🎮 игра */
function spawn() {
    if (locked) return;

    const el = document.createElement("div");
    el.className = "drop";
    el.innerText = "💖";

    el.style.left = Math.random() * 100 + "vw";
    el.style.animationDuration = (3 + Math.random() * 2) + "s";

    el.onclick = (e) => {
        e.stopPropagation();
        if (locked) return;

        score++;
        document.getElementById("score").innerText = score;
        el.remove();
    };

    game.appendChild(el);
    setTimeout(() => el.remove(), 6000);
}

setInterval(spawn, 650);

/* 📩 уведомление */
setTimeout(() => {
    notify.classList.add("show");
}, 8000);

/* 💥 старт */
notify.onclick = () => {
    if (locked) return;
    locked = true;

    game.style.display = "none";
    document.querySelector(".game-text").style.display = "none";
    document.querySelector(".score").style.display = "none";
    notify.style.display = "none";

    chat.style.display = "flex";

    startChat();
};

/* 💬 чат */
function startChat() {

const msgs = [
"Лерочка..",
"Слушай… сегодня твой день ✨",
"Я просто рад, что ты есть в моей жизни 🥰",
"Ты очень особенная 💖",
"И я хочу, чтобы ты была счастлива ❤️",
"Сегодня и всегда 💙"
];

let i = 0;

function next() {
    if (i >= msgs.length) return finish();

    status.innerText = "печатает…";

    setTimeout(() => {

        status.innerText = "в сети";

        const d = document.createElement("div");
        d.className = "msg";
        d.innerText = msgs[i];

        messages.appendChild(d);
        setTimeout(() => d.classList.add("show"), 50);

        messages.scrollTop = messages.scrollHeight;

        i++;
        setTimeout(next, 1100);

    }, 1400);
}

next();
}

/* 🎬 финал */
function finish() {
    chat.style.display = "none";

    const f = document.getElementById("final");
    const t = document.getElementById("top");
    const b = document.getElementById("bottom");

    f.style.display = "flex";

    setTimeout(() => {
        t.classList.add("show");
    }, 600);

    setTimeout(() => {
        b.classList.add("show");
    }, 1400);
}

</script>

</body>
</html>
