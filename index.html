<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>💌</title>

<style>
html, body {
    margin:0;
    height:100%;
    background:#0e1621;
    font-family:Arial;
    overflow:hidden;
    color:white;
}

/* 💖 фоновые сердечки */
.bg-heart {
    position:fixed;
    font-size:18px;
    opacity:0.15;
    animation:floatUp linear infinite;
    pointer-events:none;
}

@keyframes floatUp {
    from { transform:translateY(100vh); }
    to { transform:translateY(-10vh); }
}

/* 📩 уведомление */
.notify {
    position:fixed;
    top:-120px;
    left:0;
    right:0;
    margin:auto;
    width:90%;
    max-width:420px;
    background:#1f1f1f;
    border-radius:12px;
    padding:12px;
    transition:0.6s;
    z-index:999;
    text-align:center;
}

.notify.show { top:15px; }

/* 💬 чат */
.chat {
    display:none;
    flex-direction:column;
    height:100vh;
    position:relative;
    z-index:2;
}

.topbar {
    height:60px;
    background:#17212b;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:0 15px;
}

.title { font-weight:bold; }
.status { font-size:12px; color:#7aa2c0; }

.messages {
    flex:1;
    padding:15px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
}

.msg {
    background:#2b5278;
    padding:8px 12px;
    border-radius:14px;
    max-width:75%;
    font-size:14px;
    margin-top:8px;
    opacity:0;
    transform:translateY(8px);
    transition:0.3s;
}

.msg.show {
    opacity:1;
    transform:translateY(0);
}

/* 🔘 */
.next-btn {
    display:none;
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#2b5278;
    padding:10px 18px;
    border-radius:20px;
    cursor:pointer;
}

/* ❤️ финал */
.final {
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:black;
    z-index:60;
}

.heart {
    font-size:90px;
    animation:pulse 1.2s infinite;
}

@keyframes pulse {
    0% { transform:scale(1); }
    50% { transform:scale(1.15); }
    100% { transform:scale(1); }
}

.text {
    position:absolute;
    font-size:22px;
    opacity:0;
    transition:1s;
}

.top { top:25%; }
.bottom { bottom:25%; }

.show { opacity:1 !important; }

</style>
</head>

<body>

<!-- 📩 -->
<div class="notify" id="notify">Telegram — новое сообщение 💌</div>

<!-- 💬 -->
<div class="chat" id="chat">
    <div class="topbar">
        <div class="title">Darling❤️</div>
        <div class="status" id="status">в сети</div>
    </div>
    <div class="messages" id="messages"></div>
</div>

<!-- 🔘 -->
<div class="next-btn" id="nextBtn">Далее</div>

<!-- ❤️ -->
<div class="final" id="final">
    <div class="text top" id="top">С днём рождения</div>
    <div class="heart">❤️</div>
    <div class="text bottom" id="bottom">Любимая</div>
</div>

<script>

const notify = document.getElementById("notify");
const chat = document.getElementById("chat");
const messages = document.getElementById("messages");
const status = document.getElementById("status");
const nextBtn = document.getElementById("nextBtn");

let i = 0;

/* 💬 текст */
const msgs = [
"Лерочка…",
"Слушай… сегодня твой день ✨",
"Я не буду пытаться сказать что-то слишком идеальное — это, наверное, и не нужно",
"Я просто рад, что ты есть в моей жизни… правда",
"С тобой у меня много спокойствия и тепла внутри",
"Ты очень особенная для меня",
"И я правда ценю тебя",
"Я хочу, чтобы у тебя всё было хорошо",
"Ты намного сильнее, чем думаешь",
"И мне важно, чтобы ты улыбалась",
"Сегодня. И всегда",
"С днём рождения тебя 🎂",
"И знай — я рядом ❤️"
];

/* 📩 старт */
setTimeout(()=>notify.classList.add("show"),1500);

notify.onclick = () => {
notify.style.display="none";
chat.style.display="flex";
startChat();
};

/* 💬 чат */
function startChat(){

function next(){

if(i >= msgs.length){
nextBtn.style.display="block";
return;
}

status.innerText="печатает…";

setTimeout(()=>{

status.innerText="в сети";

const d = document.createElement("div");
d.className = "msg";
d.innerText = msgs[i];

messages.appendChild(d);
setTimeout(()=>d.classList.add("show"),50);

messages.scrollTop = messages.scrollHeight;

i++;
setTimeout(next,900);

},800);

}

next();
}

/* 🔘 финал */
nextBtn.onclick = () => {

document.getElementById("final").style.display="flex";

setTimeout(()=>document.getElementById("top").classList.add("show"),800);
setTimeout(()=>document.getElementById("bottom").classList.add("show"),1600);

};

/* 💖 фоновые сердечки */
function createHearts(){
const h = document.createElement("div");
h.className = "bg-heart";
h.innerText = "❤️";

h.style.left = Math.random()*100 + "vw";
h.style.animationDuration = (5+Math.random()*5) + "s";
h.style.fontSize = (12+Math.random()*10) + "px";

document.body.appendChild(h);

setTimeout(()=>h.remove(),10000);
}

setInterval(createHearts,400);

</script>

</body>
</html>
