<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>💙</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0e1621;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* старт экран */
.start {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* уведомление */
.notify {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);

    background: #1c2b3a;
    color: white;
    padding: 12px 16px;
    border-radius: 12px;

    opacity: 0;
    transition: 0.4s;
    cursor: pointer;
}

.notify.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* чат */
.chat {
    display: none;
    flex-direction: column;
    height: 100vh;
}

/* верх */
.topbar {
    height: 60px;
    background: #17212b;
    display: flex;
    align-items: center;
    padding: 0 15px;
    font-weight: bold;
    color: white;
}

/* сообщения */
.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

/* пузырь */
.msg {
    background: #182533;
    padding: 10px 12px;
    border-radius: 12px;
    max-width: 85%;

    margin-top: 10px;

    opacity: 0;
    transform: translateY(10px);
    transition: 0.5s;
    color: white;
}

.msg.show {
    opacity: 1;
    transform: translateY(0);
}

/* входящие */
.in {
    background: #2b5278;
    margin-right: auto;
}

/* подарок */
.gift {
    font-size: 40px;
    text-align: center;
    margin-top: 20px;
    opacity: 0;
    transition: 0.6s;
}

.gift.show {
    opacity: 1;
}
</style>

</head>

<body>

<!-- уведомление -->
<div class="notify" id="notify">Новое сообщение💌</div>

<!-- старт -->
<div class="start" id="start"></div>

<!-- чат -->
<div class="chat" id="chat">

    <div class="topbar">Darling❤️</div>

    <div class="messages" id="messages"></div>

</div>

<script>

const messages = [
"Лерочка..",
"Слушай… сегодня твой день",
"Я не буду пытаться сказать что-то слишком идеальное — да и, честно, это сейчас не главное",
"Я просто рад, что ты есть в моей жизни… правда🥰",
"Ты для меня очень особенная. Даже если я не всегда умею это нормально показать.",
"И знаешь… я правда хочу, чтобы у тебя было больше спокойных дней.",
"Таких, где тебе легко, где ты просто улыбаешься ни с чего 💖",
"И чтобы ты меньше сомневалась в себе — ты намного лучше, чем иногда думаешь 🌸",
"И если совсем честно… я просто хочу, чтобы ты была счастлива. По-настоящему.",
"Сегодня. И всегда ❤️",
"Поздравляю тебя с твоим 16 днем рождения, котенок💋"
];

function showNotify() {
    const n = document.getElementById("notify");
    n.classList.add("show");

    n.onclick = openChat;
}

function openChat() {
    document.getElementById("start").style.display = "none";
    document.getElementById("notify").style.display = "none";
    document.getElementById("chat").style.display = "flex";

    typeMessages();
}

function addMessage(text, delay) {
    setTimeout(() => {
        const msg = document.createElement("div");
        msg.className = "msg in";
        msg.innerText = text;

        document.getElementById("messages").appendChild(msg);

        setTimeout(() => {
            msg.classList.add("show");
        }, 50);

    }, delay);
}

function typeMessages() {
    let time = 0;

    messages.forEach((m) => {
        addMessage(m, time);
        time += 900;
    });

    setTimeout(() => {
        const gift = document.createElement("div");
        gift.className = "gift";
        gift.innerText = "🎁";

        document.getElementById("messages").appendChild(gift);

        setTimeout(() => {
            gift.classList.add("show");
        }, 300);

    }, time + 500);
}

/* старт */
setTimeout(() => {
    showNotify();
}, 1200);

</script>

</body>
</html>
