<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>💙</title>

<style>
html, body {
    margin:0;
    height:100%;
    background:#0e1621;
    font-family:Arial;
    overflow:hidden;
    color:white;
}

/* 🎮 ИГРА */
.game {
    position:fixed;
    inset:0;
    z-index:1;
}

.game-text {
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:#7aa2c0;
    pointer-events:none;
    z-index:2;
}

.score {
    position:fixed;
    top:15px;
    left:15px;
    z-index:2;
}

.drop {
    position:absolute;
    font-size:30px;
    cursor:pointer;
    z-index:10; /* 💥 важно */
    pointer-events:auto;
    animation:fall linear forwards;
}

@keyframes fall {
    from { transform:translateY(-60px); }
    to { transform:translateY(110vh); }
}

/* 📩 */
.notify {
    position:fixed;
    top:-100px;
    left:0;
    right:0;
    margin:auto;
    width:90%;
    max-width:420px;
    background:#1f1f1f;
    border-radius:12px;
    padding:12px;
    transition:0.5s;
    z-index:999;
}

.notify.show { top:10px; }

/* 💬 чат */
.chat {
    display:none;
    flex-direction:column;
    height:100vh;
}

.topbar {
    height:60px;
    background:#17212b;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:0 15px;
}

.title { font-weight:bold; }
.status { font-size:12px; color:#7aa2c0; }

.messages {
    flex:1;
    padding:15px;
    padding-bottom:100px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
}

.msg {
    background:#2b5278;
    padding:9px 13px;
    border-radius:14px;
    max-width:75%;
    font-size:14px;
    margin-top:8px;
    opacity:0;
    transform:translateY(8px);
    transition:0.35s;
}

.msg.show {
    opacity:1;
    transform:translateY(0);
}

/* 🎬 финал */
.final {
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:black;
    z-index:50;
}

.heart {
    font-size:90px;
    opacity:0;
    transform:scale(0.6);
    transition:1s;
    animation:pulse 1.2s infinite;
}

@keyframes pulse {
    0% { transform:scale(1); }
    50% { transform:scale(1.15); }
    100% { transform:scale(1); }
}

.text {
    position:absolute;
    font-size:22px;
    opacity:0;
    transition:1s;
}

.top { top:25%; }
.bottom { bottom:25%; }

.show {
    opacity:1 !important;
    transform:translateY(0) scale(1) !important;
}
</style>
</head>

<body>

<!-- 🎮 -->
<div class="score">💖: <span id="score">0</span></div>
<div class="game" id="game"></div>
<div class="game-text">нажимай на сердечки 💖</div>

<!-- 📩 -->
<div class="notify" id="notify">Telegram — новое сообщение 💌</div>

<!-- 💬 -->
<div class="chat" id="chat">
    <div class="topbar">
        <div class="title">Darling❤️</div>
        <div class="status" id="status">в сети</div>
    </div>
    <div class="messages" id="messages"></div>
</div>

<!-- ❤️ -->
<div class="final" id="final">
    <div class="text top" id="top">С днём рождения</div>
    <div class="heart">❤️</div>
    <div class="text bottom" id="bottom">Любимая</div>
</div>

<script>

let locked=false;
let score=0;

const game=document.getElementById("game");
const notify=document.getElementById("notify");
const chat=document.getElementById("chat");
const messages=document.getElementById("messages");
const status=document.getElementById("status");

/* 🎮 ИГРА */
function spawn(){
if(locked) return;

const el=document.createElement("div");
el.className="drop";
el.innerText="💖";

el.style.left=Math.random()*100+"vw";
el.style.animationDuration=(3+Math.random()*2)+"s";

el.onclick=(e)=>{
e.stopPropagation();
if(locked) return;

score++;
document.getElementById("score").innerText=score;
el.remove();
};

game.appendChild(el);
setTimeout(()=>el.remove(),6000);
}

setInterval(spawn,600);

/* 📩 */
setTimeout(()=>notify.classList.add("show"),8000);

/* 💥 старт */
notify.onclick=()=>{
if(locked) return;
locked=true;

game.style.opacity="0";
document.querySelector(".game-text").style.opacity="0";
document.querySelector(".score").style.opacity="0";
notify.style.display="none";

chat.style.display="flex";

startChat();
};

/* 💬 ПОЛНОЕ ПОЗДРАВЛЕНИЕ (ВОССТАНОВЛЕНО) */
function startChat(){

const msgs=[
"Лерочка.. 💙",
"Слушай… сегодня твой день ✨",
"Я не буду пытаться сказать что-то идеальное — это не главное 💫",
"Я просто рад, что ты есть в моей жизни… правда 🥰",
"Ты очень особенная для меня 💖",
"Даже если я не всегда это умею показать",
"Я хочу, чтобы у тебя было больше спокойных дней 🌸",
"Где тебе легко и хорошо просто так",
"Чтобы ты чаще улыбалась 💕",
"И меньше сомневалась в себе",
"Ты намного лучше, чем думаешь ✨",
"И если честно… я просто хочу, чтобы ты была счастлива ❤️",
"Сегодня и всегда 💙"
];

let i=0;

function next(){
if(i>=msgs.length) return finish();

status.innerText="печатает…";

setTimeout(()=>{

status.innerText="в сети";

const d=document.createElement("div");
d.className="msg";
d.innerText=msgs[i];

messages.appendChild(d);
setTimeout(()=>d.classList.add("show"),50);

messages.scrollTop=messages.scrollHeight;

i++;
setTimeout(next,900);

},1300);
}

next();
}

/* 🎬 финал */
function finish(){

const final=document.getElementById("final");
const top=document.getElementById("top");
const bottom=document.getElementById("bottom");

chat.style.opacity="0";

setTimeout(()=>final.style.display="flex",800);

setTimeout(()=>top.classList.add("show"),1400);
setTimeout(()=>bottom.classList.add("show"),2200);
}

</script>

</body>
</html>
