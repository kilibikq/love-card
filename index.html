<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>💙</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0e1621;
    font-family: Arial, sans-serif;
    overflow: hidden;
    color: white;
}

/* 🎮 игра */
.game {
    position: absolute;
    inset: 0;
}

.game-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #7aa2c0;
    font-size: 18px;
}

.score {
    position: fixed;
    top: 15px;
    left: 15px;
    z-index: 5;
}

.drop {
    position: absolute;
    font-size: 28px;
    animation: fall linear forwards;
}

@keyframes fall {
    from { transform: translateY(-50px); }
    to { transform: translateY(110vh); }
}

/* 📩 уведомление */
.notify {
    position: fixed;
    top: -100px;
    left: 0;
    right: 0;
    margin: auto;
    width: 95%;
    max-width: 420px;

    background: #1f1f1f;
    border-radius: 12px;
    padding: 12px;

    display: flex;
    gap: 10px;
    align-items: center;

    transition: 0.5s;
    z-index: 20;
}

.notify.show { top: 10px; }

.logo {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #2AABEE;
    display: flex;
    align-items: center;
    justify-content: center;
}

.notify-text {
    display: flex;
    flex-direction: column;
}

/* 💬 чат */
.chat {
    display: none;
    flex-direction: column;
    height: 100vh;
}

.topbar {
    height: 60px;
    background: #17212b;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 15px;
}

.title { font-weight: bold; }
.status { font-size: 12px; color: #7aa2c0; }

.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    padding-bottom: 140px;

    display: flex;
    flex-direction: column;
    align-items: flex-start;
}

.msg {
    background: #2b5278;
    padding: 10px 14px;
    border-radius: 16px;

    max-width: 75%;
    margin-top: 10px;

    opacity: 0;
    transform: translateY(10px);
    transition: 0.4s;
}

.msg.show {
    opacity: 1;
    transform: translateY(0);
}

/* 🎬 затемнение */
.fade {
    position: fixed;
    inset: 0;
    background: black;
    opacity: 0;
    pointer-events: none;
    transition: 2s;
    z-index: 50;
}

.fade.show {
    opacity: 0.85;
    pointer-events: all;
}

/* 🎁 подарок */
.gift {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);

    font-size: 70px;
    opacity: 0;
    transition: 0.8s;
    z-index: 60;
    cursor: pointer;
}

.gift.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}

/* вторая сцена */
.scene2 {
    display: none;
    position: fixed;
    inset: 0;
    background: #0e1621;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
    z-index: 70;
}

.scene2 h1 {
    font-size: 22px;
}
</style>
</head>

<body>

<!-- 🎮 -->
<div class="score">💖: <span id="score">0</span></div>
<div class="game" id="game"></div>
<div class="game-text">лови сердечки 💖</div>

<!-- 📩 -->
<div class="notify" id="notify">
    <div class="logo">✈️</div>
    <div>
        <b>Telegram</b><br>
        Darling❤️: новое сообщение 💌
    </div>
</div>

<!-- 💬 -->
<div class="chat" id="chat">
    <div class="topbar">
        <div class="title">Darling❤️</div>
        <div class="status" id="status">в сети</div>
    </div>

    <div class="messages" id="messages"></div>
</div>

<!-- 🎬 -->
<div class="fade" id="fade"></div>

<!-- 🎁 -->
<div class="gift" id="gift">🎁</div>

<!-- 💭 вторая сцена -->
<div class="scene2" id="scene2">
    <h1>Вторая часть поздравления будет здесь 💙</h1>
</div>

<script>

/* 🎮 игра */
let score = 0;
const game = document.getElementById("game");

function spawnHeart() {
    const el = document.createElement("div");
    el.className = "drop";
    el.innerText = "💖";

    el.style.left = Math.random() * 100 + "vw";
    el.style.animationDuration = (4 + Math.random() * 2) + "s";

    el.onclick = () => {
        score++;
        document.getElementById("score").innerText = score;
        el.remove();
    };

    game.appendChild(el);
    setTimeout(() => el.remove(), 6000);
}

setInterval(spawnHeart, 700);

/* уведомление */
setTimeout(() => {
    document.getElementById("notify").classList.add("show");
}, 10000);

/* открыть чат */
document.getElementById("notify").onclick = () => {
    document.getElementById("game").style.display = "none";
    document.querySelector(".game-text").style.display = "none";
    document.getElementById("notify").style.display = "none";
    document.getElementById("chat").style.display = "flex";
    sendMessages();
};

/* сообщения */
const messages = [
"Лерочка..",
"Слушай… сегодня твой день",
"Я просто рад, что ты есть в моей жизни… правда🥰",
"Ты для меня очень особенная 💖",
"И я хочу, чтобы ты была счастлива ❤️",
"Сегодня. И всегда ❤️"
];

const statusEl = document.getElementById("status");

function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function scrollDown() {
    const box = document.getElementById("messages");
    setTimeout(() => box.scrollTop = box.scrollHeight, 100);
}

/* 💬 чат */
function sendMessages() {
    let i = 0;

    function next() {
        if (i >= messages.length) {
            startFinalScene();
            return;
        }

        statusEl.innerText = "печатает…";

        setTimeout(() => {

            statusEl.innerText = "в сети";

            const msg = document.createElement("div");
            msg.className = "msg";
            msg.innerText = messages[i];

            document.getElementById("messages").appendChild(msg);

            setTimeout(() => msg.classList.add("show"), 50);

            scrollDown();
            i++;

            setTimeout(next, rand(1400, 2200));

        }, rand(1600, 2600));
    }

    next();
}

/* 🎬 финал */
function startFinalScene() {

    const fade = document.getElementById("fade");
    const gift = document.getElementById("gift");

    fade.classList.add("show");

    setTimeout(() => {
        gift.classList.add("show");
    }, 2000);

    gift.onclick = () => {
        gift.style.display = "none";
        fade.style.display = "none";

        document.getElementById("chat").style.display = "none";
        document.getElementById("scene2").style.display = "flex";
    };
}

</script>

</body>
</html>
