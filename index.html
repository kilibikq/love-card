<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>С Днем Рождения 💖</title>

<style>
/* 🌐 GLOBAL FIX MOBILE */
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: radial-gradient(circle at top, #1a1a2e, #0b1020);
    font-family: Arial, sans-serif;
}

/* 💡 фикс iOS 100vh */
body {
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    color: white;
}

/* 🌌 фон */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size: 50px 50px;
    opacity: 0.07;
    animation: moveStars 80s linear infinite;
    z-index: 0;
}

@keyframes moveStars {
    from { transform: translateY(0); }
    to { transform: translateY(-1000px); }
}

/* ✨ мягкое заполнение чтобы не было пустоты */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, rgba(255,255,255,0.05), transparent 60%);
    z-index: 0;
}

/* 📦 контейнер */
.container {
    text-align: center;
    z-index: 2;
    padding: 20px;
    max-width: 90vw;
}

/* ❤️ сердце */
.heart {
    font-size: clamp(60px, 14vw, 90px);
    cursor: pointer;
    animation: pulse 1.4s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

/* 🌟 имя */
.name {
    font-size: clamp(28px, 7vw, 44px);
    min-height: 50px;
    text-shadow: 0 0 18px rgba(255,255,255,0.9);
    opacity: 0;
    transform: scale(0.8);
    transition: all 0.8s ease;
}

.name.show {
    opacity: 1;
    transform: scale(1.05);
}

/* 💬 текст */
.message {
    font-size: clamp(20px, 5vw, 34px);
    margin-top: 10px;
    min-height: 40px;
    opacity: 0;
    transition: 1s;
}

.message.show {
    opacity: 1;
}

/* 🎂 */
.cake {
    font-size: clamp(60px, 14vw, 85px);
    margin-top: 15px;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.6s ease;
}

.cake.show {
    opacity: 1;
    transform: scale(1.2);
}

/* 💖 финал */
.final {
    margin-top: 15px;
    font-size: clamp(14px, 4vw, 18px);
    opacity: 0;
    transition: 1.2s;
    line-height: 1.6;
}

.final.show {
    opacity: 1;
}

/* 💫 частицы */
.particle {
    position: fixed;
    pointer-events: none;
    z-index: 1;
    animation: floatUp linear forwards;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translateY(-120vh); opacity: 0; }
}

/* 💥 вспышка */
.flash {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    z-index: 10;
    pointer-events: none;
}

.flash.show {
    animation: flash 0.35s ease;
}

@keyframes flash {
    0% { opacity: 0; }
    50% { opacity: 0.6; }
    100% { opacity: 0; }
}

/* 📱 защита от “пустого низа” */
.safe-area {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
}
</style>

</head>

<body>

<div class="flash" id="flash"></div>

<div class="container">

    <div class="heart" id="heart">💖</div>

    <div class="name" id="name"></div>

    <div class="message" id="text"></div>

    <div class="cake" id="cake">🎂</div>

    <div class="final" id="final">
        Пусть твоя жизнь будет тёплой и счастливой ✨<br>
        Пусть каждый день приносит улыбки и заботу 💫<br>
        Пусть рядом всегда будут те, кто ценит тебя 💖<br>
        И пусть сбываются даже самые тихие мечты 🌸
    </div>

</div>

<script>
const name = "Лерочка";
const text = "С днем рождения, любимая ❤️";

let started = false;

/* 💥 вспышка */
function flash() {
    const f = document.getElementById("flash");
    f.classList.add("show");
    setTimeout(() => f.classList.remove("show"), 350);
}

/* 🌟 имя */
function showName(i = 0) {
    const el = document.getElementById("name");
    if (i === 0) el.textContent = "";

    if (i < name.length) {
        el.textContent += name[i];
        setTimeout(() => showName(i + 1), 130);
    } else {
        flash();
        el.classList.add("show");
        setTimeout(() => showText(), 500);
    }
}

/* 💬 текст */
function showText(i = 0) {
    const el = document.getElementById("text");
    if (i === 0) el.textContent = "";

    if (i < text.length) {
        el.textContent += text[i];
        setTimeout(() => showText(i + 1), 55);
    } else {
        el.classList.add("show");

        setTimeout(() => {
            flash();
            document.getElementById("cake").classList.add("show");

            setTimeout(() => {
                document.getElementById("final").classList.add("show");
            }, 800);

        }, 700);
    }
}

/* 💫 частицы */
function spawnParticle() {
    const p = document.createElement("div");
    p.className = "particle";

    const symbols = ["✨", "⭐", "💫", "🌸", "💖"];
    p.innerText = symbols[Math.floor(Math.random() * symbols.length)];

    p.style.left = Math.random() * 100 + "vw";
    p.style.top = "100vh";

    const duration = 6 + Math.random() * 4;
    p.style.animationDuration = duration + "s";

    document.body.appendChild(p);

    setTimeout(() => p.remove(), duration * 1000);
}

setInterval(spawnParticle, 140);

/* 🚀 старт */
document.getElementById("heart").onclick = function () {
    if (started) return;
    started = true;
    showName();
};
</script>

</body>
</html>
