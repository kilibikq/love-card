<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💌</title>

<style>
html,body{
margin:0;
height:100%;
background:#0e1621;
font-family:Arial;
overflow:hidden;
color:white;
}

/* 🌸 поле */
.game{
position:fixed;
inset:0;
display:flex;
flex-wrap:wrap;
align-content:flex-start;
padding:20px;
gap:10px;
}

.item{
width:60px;
height:60px;
display:flex;
justify-content:center;
align-items:center;
font-size:32px;
border-radius:12px;
background:rgba(255,255,255,0.05);
cursor:pointer;
user-select:none;
}

/* 📊 */
.score{
position:fixed;
top:15px;
left:15px;
}

/* 📩 */
.notify{
position:fixed;
top:-120px;
left:0;
right:0;
margin:auto;
width:90%;
max-width:420px;
background:#1f1f1f;
border-radius:12px;
padding:12px;
transition:0.5s;
}

.notify.show{ top:10px; }

/* 💬 чат */
.chat{
display:none;
flex-direction:column;
height:100vh;
}

.topbar{
height:60px;
background:#17212b;
display:flex;
align-items:center;
padding:0 15px;
font-weight:bold;
}

.status{
font-size:12px;
color:#7aa2c0;
margin-left:10px;
font-weight:normal;
}

.messages{
flex:1;
padding:15px;
overflow-y:auto;
display:flex;
flex-direction:column;
}

.msg{
background:#2b5278;
padding:9px 12px;
border-radius:14px;
max-width:80%;
font-size:14px;
margin-top:8px;
opacity:0;
transform:translateY(8px);
transition:0.3s;
}

.msg.show{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<!-- 🌸 игра -->
<div class="score">Найдено 💖: <span id="score">0</span></div>
<div class="game" id="game"></div>

<!-- 📩 -->
<div class="notify" id="notify">Telegram — новое сообщение 💌</div>

<!-- 💬 -->
<div class="chat" id="chat">
  <div class="topbar">
    Darling❤️
    <span class="status" id="status">в сети</span>
  </div>

  <div class="messages" id="messages"></div>
</div>

<script>

let score = 0;
let found = 0;

const game = document.getElementById("game");
const notify = document.getElementById("notify");
const chat = document.getElementById("chat");
const messages = document.getElementById("messages");
const status = document.getElementById("status");

/* 🌸 генерация поля */
function generate(){

game.innerHTML = "";

for(let i=0;i<18;i++){

const el = document.createElement("div");
el.className = "item";

/* 1 случайное сердечко */
if(i === Math.floor(Math.random()*18)){
el.innerText = "💖";
el.onclick = () => {
score++;
document.getElementById("score").innerText = score;

found++;

if(found >= 3){
startChat();
}else{
generate();
}
};
} else {
el.innerText = "🌸";
el.onclick = () => {
el.style.opacity = "0.3";
};
}

game.appendChild(el);
}

}

generate();

/* 📩 */
setTimeout(()=>{
notify.classList.add("show");
},1500);

notify.onclick = () => {
notify.style.display = "none";
};

/* 💬 чат */
const msgs = [
"Лерочка…",
"Слушай… сегодня твой день ✨",
"Я просто рад, что ты есть 🥰",
"Ты очень особенная 💖",
"И я хочу, чтобы ты была счастлива ❤️",
"Сегодня… и всегда",
"С днём рождения тебя 🎂",
"И знай — я рядом ❤️"
];

let i = 0;

function startChat(){

game.style.display = "none";
chat.style.display = "flex";

function next(){

if(i >= msgs.length){
status.innerText = "в сети";
return;
}

status.innerText = "печатает…";

setTimeout(()=>{

status.innerText = "в сети";

const d = document.createElement("div");
d.className = "msg";
d.innerText = msgs[i];

messages.appendChild(d);
setTimeout(()=>d.classList.add("show"),50);

messages.scrollTop = messages.scrollHeight;

i++;

setTimeout(next,900);

},1000);

}

next();
}

</script>

</body>
</html>
