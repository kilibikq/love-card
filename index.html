<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💌</title>

<style>
html,body{
margin:0;
height:100%;
background:#0e1621;
font-family:Arial;
overflow:hidden;
color:white;
}

/* ⏳ пустой старт */
.start-screen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
color:#7aa2c0;
font-size:14px;
}

/* 📩 уведомление */
.notify{
position:fixed;
top:-120px;
left:0;
right:0;
margin:auto;
width:90%;
max-width:420px;
background:#1f1f1f;
border-radius:12px;
padding:12px;
transition:0.5s;
z-index:10;
}

.notify.show{ top:10px; }

/* 💬 чат */
.chat{
display:none;
flex-direction:column;
height:100vh;
}

.topbar{
height:60px;
background:#17212b;
display:flex;
align-items:center;
padding:0 15px;
font-weight:bold;
}

.status{
font-size:12px;
color:#7aa2c0;
margin-left:10px;
font-weight:normal;
}

.messages{
flex:1;
padding:15px;
overflow-y:auto;
display:flex;
flex-direction:column;
}

.msg{
background:#2b5278;
padding:9px 12px;
border-radius:14px;
max-width:80%;
font-size:14px;
margin-top:8px;
opacity:0;
transform:translateY(8px);
transition:0.3s;
}

.msg.show{
opacity:1;
transform:translateY(0);
}

/* 🔘 кнопка */
.next-btn{
display:none;
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#2b5278;
padding:10px 18px;
border-radius:20px;
cursor:pointer;
}

/* 🌙 */
.fade{
position:fixed;
inset:0;
background:black;
opacity:0;
transition:1.5s;
z-index:50;
}

/* ❤️ финал */
.final{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
background:black;
z-index:60;
}

.heart{
font-size:90px;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.15);}
100%{transform:scale(1);}
}

.text{
position:absolute;
font-size:22px;
opacity:0;
transition:1s;
}

.top{ top:25%; }
.bottom{ bottom:25%; }

.show{ opacity:1; }

</style>
</head>

<body>

<!-- ⏳ интро -->
<div class="start-screen" id="start">
ожидание сообщения…
</div>

<!-- 📩 -->
<div class="notify" id="notify">Telegram — новое сообщение 💌</div>

<!-- 💬 -->
<div class="chat" id="chat">
  <div class="topbar">
    Darling❤️
    <span class="status" id="status">в сети</span>
  </div>

  <div class="messages" id="messages"></div>
</div>

<!-- 🔘 -->
<div class="next-btn" id="nextBtn">Далее</div>

<!-- 🌙 -->
<div class="fade" id="fade"></div>

<!-- ❤️ -->
<div class="final" id="final">
  <div class="text top" id="top">С днём рождения</div>
  <div class="heart">❤️</div>
  <div class="text bottom" id="bottom">Любимая</div>
</div>

<script>

/* ⏳ задержка интриги */
setTimeout(()=>{
document.getElementById("start").style.display="none";
document.getElementById("notify").classList.add("show");
},10000);

/* 📩 */
const notify = document.getElementById("notify");
const chat = document.getElementById("chat");
const messages = document.getElementById("messages");
const status = document.getElementById("status");
const nextBtn = document.getElementById("nextBtn");

/* старт */
notify.onclick = () => {
notify.style.display = "none";
chat.style.display = "flex";
startChat();
};

/* 💬 текст */
const msgs = [
"Лерочка…",
"Слушай… сегодня твой день ✨",
"Я не буду пытаться сказать что-то слишком идеальное — это, наверное, и не нужно 💫",
"Я просто рад, что ты есть в моей жизни… правда 🥰",
"Ты очень особенная для меня 💖",
"И я хочу, чтобы ты была счастлива ❤️",
"Сегодня… и всегда",
"С днём рождения тебя 🎂",
"И несмотря ни на что — знай, я рядом ❤️"
];

let i = 0;

function startChat(){

function next(){

if(i >= msgs.length){
nextBtn.style.display = "block";
return;
}

status.innerText = "печатает…";

setTimeout(()=>{

status.innerText = "в сети";

const d = document.createElement("div");
d.className = "msg";
d.innerText = msgs[i];

messages.appendChild(d);
setTimeout(()=>d.classList.add("show"),50);

messages.scrollTop = messages.scrollHeight;

i++;

setTimeout(next,900);

},1200);

}

next();
}

/* 🔘 финал */
nextBtn.onclick = () => {

document.getElementById("fade").classList.add("show");

setTimeout(()=>{
document.getElementById("final").style.display = "flex";
},1500);

setTimeout(()=>{
document.getElementById("top").classList.add("show");
},2200);

setTimeout(()=>{
document.getElementById("bottom").classList.add("show");
},3000);

};

</script>

</body>
</html>
