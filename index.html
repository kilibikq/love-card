<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>💙</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0e1621;
    font-family: Arial, sans-serif;
    overflow: hidden;
    color: white;
}

/* 🎮 мини-игра */
.game {
    position: absolute;
    inset: 0;
}

.score {
    position: fixed;
    top: 15px;
    left: 15px;
    font-size: 16px;
    z-index: 5;
}

/* сердечки */
.drop {
    position: absolute;
    font-size: 28px;
    cursor: pointer;
    user-select: none;
    animation: fall linear forwards;
}

@keyframes fall {
    from { transform: translateY(-50px); }
    to { transform: translateY(110vh); }
}

/* уведомление */
.notify {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #1c2b3a;
    padding: 12px 16px;
    border-radius: 12px;
    opacity: 0;
    transition: 0.4s;
    cursor: pointer;
    z-index: 20;
}

.notify.show { opacity: 1; }

/* чат */
.chat {
    display: none;
    flex-direction: column;
    height: 100vh;
}

/* верх */
.topbar {
    height: 60px;
    background: #17212b;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 15px;
}

.title { font-weight: bold; }
.status { font-size: 12px; color: #7aa2c0; }

/* сообщения */
.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    padding-bottom: 140px;

    display: flex;
    flex-direction: column;
    align-items: flex-start;
}

.msg {
    background: #2b5278;
    padding: 10px 14px;
    border-radius: 16px;

    display: inline-block;
    max-width: 75%;
    margin-top: 10px;

    opacity: 0;
    transform: translateY(10px);
    transition: 0.4s;
}

.msg.show {
    opacity: 1;
    transform: translateY(0);
}

.typing {
    font-size: 14px;
    color: #7aa2c0;
    margin-top: 10px;
}

.gift {
    font-size: 50px;
    text-align: center;
    margin-top: 30px;
    opacity: 0;
    transition: 0.6s;
}

.gift.show { opacity: 1; }
</style>
</head>

<body>

<div class="score">💖: <span id="score">0</span></div>
<div class="game" id="game"></div>

<div class="notify" id="notify">Новое сообщение💌</div>

<div class="chat" id="chat">
    <div class="topbar">
        <div class="title">Darling❤️</div>
        <div class="status">в сети</div>
    </div>
    <div class="messages" id="messages">
        <div class="typing" id="typing" style="display:none;">печатает…</div>
    </div>
</div>

<script>
let score = 0;
const game = document.getElementById("game");

/* 🎮 генерация сердечек */
function spawnHeart() {
    const el = document.createElement("div");
    el.className = "drop";
    el.innerText = "💖";

    el.style.left = Math.random() * 100 + "vw";
    const duration = 4 + Math.random() * 3;
    el.style.animationDuration = duration + "s";

    el.onclick = () => {
        score++;
        document.getElementById("score").innerText = score;
        el.remove();
    };

    game.appendChild(el);

    setTimeout(() => el.remove(), duration * 1000);
}

setInterval(spawnHeart, 700);

/* 📩 уведомление через 10 сек */
setTimeout(() => {
    document.getElementById("notify").classList.add("show");
}, 10000);

/* открыть чат */
document.getElementById("notify").onclick = () => {
    document.getElementById("game").style.display = "none";
    document.querySelector(".score").style.display = "none";
    document.getElementById("notify").style.display = "none";
    document.getElementById("chat").style.display = "flex";
    sendMessages();
};

/* сообщения */
const messages = [
"Лерочка..",
"Слушай… сегодня твой день",
"Я просто рад, что ты есть в моей жизни… правда🥰",
"Ты для меня очень особенная 💖",
"И я хочу, чтобы ты была счастлива ❤️",
"С днем рождения, котенок💋"
];

const typingEl = document.getElementById("typing");

function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function scrollDown() {
    const box = document.getElementById("messages");
    setTimeout(() => box.scrollTop = box.scrollHeight, 100);
}

function sendMessages() {
    let i = 0;

    function next() {
        if (i >= messages.length) {
            showGift();
            return;
        }

        typingEl.style.display = "block";
        scrollDown();

        setTimeout(() => {
            typingEl.style.display = "none";

            const msg = document.createElement("div");
            msg.className = "msg";
            msg.innerText = messages[i];

            document.getElementById("messages").appendChild(msg);

            setTimeout(() => msg.classList.add("show"), 50);

            scrollDown();
            i++;

            setTimeout(next, rand(2000, 3500));

        }, rand(2000, 3500));
    }

    next();
}

function showGift() {
    const gift = document.createElement("div");
    gift.className = "gift";
    gift.innerText = "🎁";

    document.getElementById("messages").appendChild(gift);

    setTimeout(() => {
        gift.classList.add("show");
        scrollDown();
    }, 300);
}
</script>

</body>
</html>
