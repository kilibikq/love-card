<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>С Днем Рождения 💖</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at top, #1a1a2e, #0b1020);
    font-family: Arial, sans-serif;
    color: white;
}

body {
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* фон */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size: 50px 50px;
    opacity: 0.07;
    animation: moveStars 80s linear infinite;
}

@keyframes moveStars {
    from { transform: translateY(0); }
    to { transform: translateY(-1000px); }
}

/* контейнер */
.container {
    text-align: center;
    z-index: 2;
    padding: 20px;
    max-width: 90vw;
}

/* сердце */
.heart {
    font-size: 80px;
    cursor: pointer;
    animation: pulse 1.4s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

/* имя */
.name {
    font-size: 40px;
    min-height: 50px;
    text-shadow: 0 0 18px rgba(255,255,255,0.9);
    opacity: 0;
    transition: 0.8s;
}

.name.show {
    opacity: 1;
}

/* 💬 текст (ИСПРАВЛЕНО) */
.message {
    font-size: 26px;
    margin-top: 10px;
    opacity: 0;
    transition: 1s;
    line-height: 1.5;
    white-space: pre-line;
}

.message.show {
    opacity: 1;
}

/* 🎂 */
.cake {
    font-size: 80px;
    margin-top: 15px;
    opacity: 0;
    transform: scale(0.6);
    transition: 0.6s;
}

.cake.show {
    opacity: 1;
    transform: scale(1.1);
}

/* финал */
.final {
    margin-top: 15px;
    font-size: 16px;
    opacity: 0;
    transition: 1s;
    line-height: 1.6;
}

.final.show {
    opacity: 1;
}

/* 💫 частицы (МЕНЬШЕ) */
.particle {
    position: fixed;
    pointer-events: none;
    z-index: 1;
    animation: floatUp linear forwards;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translateY(-120vh); opacity: 0; }
}

/* вспышка */
.flash {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    z-index: 10;
}

.flash.show {
    animation: flash 0.35s ease;
}

@keyframes flash {
    0% { opacity: 0; }
    50% { opacity: 0.5; }
    100% { opacity: 0; }
}
</style>

</head>

<body>

<div class="flash" id="flash"></div>

<div class="container">

    <div class="heart" id="heart">💖</div>

    <div class="name" id="name"></div>

    <div class="message" id="text"></div>

    <div class="cake" id="cake">🎂</div>

    <div class="final" id="final">
        Пусть твоя жизнь будет тёплой и счастливой ✨<br>
        Пусть каждый день приносит тебе радость и заботу 💫<br>
        Пусть рядом будут только искренние люди 💖<br>
        И пусть все мечты обязательно сбываются 🌸
    </div>

</div>

<script>
const name = "Лерочка";

let started = false;

function flash() {
    const f = document.getElementById("flash");
    f.classList.add("show");
    setTimeout(() => f.classList.remove("show"), 350);
}

/* имя */
function showName(i = 0) {
    const el = document.getElementById("name");

    if (i === 0) el.textContent = "";

    if (i < name.length) {
        el.textContent += name[i];
        setTimeout(() => showName(i + 1), 120);
    } else {
        flash();
        el.classList.add("show");
        setTimeout(showText, 500);
    }
}

/* 💬 текст (БЕЗ ЛОМА СТРОК) */
function showText() {
    const el = document.getElementById("text");

    const text = `С днем рождения, любимая ❤️`;

    el.innerText = text;
    el.classList.add("show");

    setTimeout(() => {
        flash();
        document.getElementById("cake").classList.add("show");

        setTimeout(() => {
            document.getElementById("final").classList.add("show");
        }, 800);

    }, 700);
}

/* 💫 частицы (МЕНЬШЕ) */
function spawnParticle() {
    const p = document.createElement("div");
    p.className = "particle";

    const symbols = ["✨", "⭐", "💫", "🌸"];
    p.innerText = symbols[Math.floor(Math.random() * symbols.length)];

    p.style.left = Math.random() * 100 + "vw";
    p.style.top = "100vh";

    const duration = 7 + Math.random() * 4;
    p.style.animationDuration = duration + "s";

    document.body.appendChild(p);

    setTimeout(() => p.remove(), duration * 1000);
}

/* 🔽 РЕЖЕ ЧАСТИЦЫ */
setInterval(spawnParticle, 260);

/* старт */
document.getElementById("heart").onclick = function () {
    if (started) return;
    started = true;
    showName();
};
</script>

</body>
</html>
