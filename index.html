<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Telegram</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0e1621;
    font-family: Arial, sans-serif;
    color: white;
}

/* верх */
.topbar {
    height: 60px;
    background: #17212b;
    display: flex;
    align-items: center;
    padding: 0 15px;
    font-weight: bold;
    position: fixed;
    width: 100%;
    top: 0;
    z-index: 10;
}

/* чат */
.chat {
    padding: 80px 15px 100px;
}

/* сообщение */
.msg {
    background: #182533;
    padding: 12px 14px;
    border-radius: 12px;
    max-width: 80%;
    margin-top: 10px;

    opacity: 0;
    transform: translateY(10px);
    transition: 0.4s;
}

.msg.show {
    opacity: 1;
    transform: translateY(0);
}

/* входящее */
.incoming {
    background: #2b5278;
    margin-right: auto;
}

/* typing */
.typing {
    display: inline-block;
}

.dots::after {
    content: "";
    animation: dots 1.2s infinite;
}

@keyframes dots {
    0% { content: ""; }
    33% { content: "."; }
    66% { content: ".."; }
    100% { content: "..."; }
}

/* уведомление */
.notify {
    position: fixed;
    top: 80px;
    right: 15px;
    background: #1c2b3a;
    padding: 10px 14px;
    border-radius: 10px;

    opacity: 0;
    transform: translateY(-10px);
    transition: 0.4s;
    z-index: 20;
}

.notify.show {
    opacity: 1;
    transform: translateY(0);
}
</style>

</head>

<body>

<div class="topbar">💙 Telegram</div>

<div class="notify" id="notify">Новое сообщение 💌</div>

<div class="chat">

    <div class="msg incoming" id="typingBox">
        <span class="typing">печатает<span class="dots"></span></span>
    </div>

    <div class="msg incoming" id="msg">
        Слушай… сегодня твой день ✨<br><br>
        Я просто рад, что ты есть в моей жизни 💫<br><br>
        Ты очень особенная для меня 🌸<br><br>
        И я хочу, чтобы ты была счастлива ❤️
    </div>

</div>

<script>

function showNotify() {
    const n = document.getElementById("notify");
    n.classList.add("show");

    setTimeout(() => n.classList.remove("show"), 2000);
}

function showMessage() {
    const typing = document.getElementById("typingBox");
    const msg = document.getElementById("msg");

    typing.style.display = "none";
    msg.classList.add("show");
}

/* старт */
setTimeout(() => {
    showNotify(); // уведомление как в Telegram

    setTimeout(() => {
        showMessage();
    }, 1800);

}, 1000);

</script>

</body>
</html>
