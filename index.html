<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>💙</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0e1621;
    font-family: Arial, sans-serif;
    overflow: hidden;
    color: white;
}

/* уведомление */
.notify {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #1c2b3a;
    padding: 12px 16px;
    border-radius: 12px;
    opacity: 0;
    transition: 0.4s;
    cursor: pointer;
    z-index: 10;
}
.notify.show { opacity: 1; }

/* чат */
.chat {
    display: none;
    flex-direction: column;
    height: 100vh;
}

/* верх */
.topbar {
    height: 60px;
    background: #17212b;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 15px;
}

.title { font-weight: bold; }

.status {
    font-size: 12px;
    color: #7aa2c0;
}

/* сообщения */
.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    padding-bottom: 140px;

    display: flex;
    flex-direction: column;
    align-items: flex-start;
}

.msg {
    background: #2b5278;
    padding: 10px 14px;
    border-radius: 16px;

    display: inline-block;
    max-width: 75%;
    margin-top: 10px;

    opacity: 0;
    transform: translateY(10px);
    transition: 0.4s;

    line-height: 1.4;
    word-break: break-word;
}

.msg.show {
    opacity: 1;
    transform: translateY(0);
}

/* подарок */
.gift {
    font-size: 50px;
    text-align: center;
    margin-top: 30px;
    opacity: 0;
    transition: 0.6s;
}
.gift.show { opacity: 1; }
</style>

</head>

<body>

<div class="notify" id="notify">Новое сообщение💌</div>

<div class="chat" id="chat">

    <div class="topbar">
        <div class="title">Darling❤️</div>
        <div class="status" id="status">в сети</div>
    </div>

    <div class="messages" id="messages"></div>

</div>

<script>

const messages = [
"Лерочка..",
"Слушай… сегодня твой день",
"Я не буду пытаться сказать что-то слишком идеальное — да и, честно, это сейчас не главное",
"Я просто рад, что ты есть в моей жизни… правда🥰",
"Ты для меня очень особенная. Даже если я не всегда умею это нормально показать.",
"И знаешь… я правда хочу, чтобы у тебя было больше спокойных дней.",
"Таких, где тебе легко, где ты просто улыбаешься ни с чего 💖",
"И чтобы ты меньше сомневалась в себе — ты намного лучше, чем иногда думаешь 🌸",
"И если совсем честно… я просто хочу, чтобы ты была счастлива. По-настоящему.",
"Сегодня. И всегда ❤️",
"Поздравляю тебя с твоим 16 днем рождения, котенок💋"
];

const statusEl = document.getElementById("status");

function showNotify() {
    const n = document.getElementById("notify");
    n.classList.add("show");
    n.onclick = openChat;
}

function openChat() {
    document.getElementById("notify").style.display = "none";
    document.getElementById("chat").style.display = "flex";
    sendMessages();
}

function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function scrollDown() {
    const box = document.getElementById("messages");
    setTimeout(() => {
        box.scrollTop = box.scrollHeight;
    }, 120);
}

function sendMessages() {
    let i = 0;

    function next() {
        if (i >= messages.length) {
            showGift();
            return;
        }

        /* 💬 статус = печатает */
        statusEl.innerText = "печатает…";

        setTimeout(() => {

            /* обратно в сети */
            statusEl.innerText = "в сети";

            const msg = document.createElement("div");
            msg.className = "msg";
            msg.innerText = messages[i];

            document.getElementById("messages").appendChild(msg);

            setTimeout(() => msg.classList.add("show"), 60);

            scrollDown();

            i++;

            setTimeout(next, rand(2000, 3500));

        }, rand(2200, 4000));
    }

    next();
}

function showGift() {
    const gift = document.createElement("div");
    gift.className = "gift";
    gift.innerText = "🎁";

    document.getElementById("messages").appendChild(gift);

    setTimeout(() => {
        gift.classList.add("show");
        scrollDown();
    }, 300);
}

setTimeout(showNotify, 10000);

</script>

</body>
</html>
