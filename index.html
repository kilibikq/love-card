<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>💌</title>

<style>
html, body {
    margin:0;
    height:100%;
    background:#0e1621;
    font-family:Arial;
    overflow:hidden;
    color:white;
}

/* 🎮 */
.game {
    position:fixed;
    inset:0;
    display:flex;
    flex-wrap:wrap;
    align-content:center;
    justify-content:center;
    gap:15px;
    padding:20px;
    touch-action: manipulation;
}

/* 🎁 */
.box {
    width:70px;
    height:70px;
    background:#2b5278;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    user-select:none;
}

/* 📝 */
.game-text-bottom{
position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);
color:#7aa2c0;
font-size:14px;
text-align:center;
}

/* 📊 */
.score {
    position:fixed;
    top:15px;
    left:15px;
    z-index:5;
}

</style>
</head>

<body>

<div class="score">Найдено ❤️: <span id="score">0</span></div>

<div class="game" id="game"></div>

<div class="game-text-bottom">найди сердечко в подарках 🎁</div>

<script>

let score = 0;
let found = false;

const game = document.getElementById("game");

function generateBoxes(){

game.innerHTML = "";
found = false;

const heartIndex = Math.floor(Math.random() * 9);

for(let i=0;i<9;i++){

const box = document.createElement("div");
box.className = "box";
box.innerText = "🎁";
box.dataset.i = i;

game.appendChild(box);
}

/* 💥 САМЫЙ СТАБИЛЬНЫЙ ХИТ-ТЕСТ */
game.ontouchstart = (e) => {

const t = e.touches[0];
const el = document.elementFromPoint(t.clientX, t.clientY);

if(!el || !el.classList.contains("box")) return;
if(found) return;

const idx = Number(el.dataset.i);

if(idx === heartIndex){

el.innerText = "❤️";
score++;
document.getElementById("score").innerText = score;

found = true;

setTimeout(generateBoxes, 600);

} else {
el.style.opacity = "0.3";
}

};

}

generateBoxes();

</script>

</body>
</html>
