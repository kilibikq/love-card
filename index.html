<script>

/* блокировка состояния */
let locked = false;

/* 🎮 игра */
let score = 0;
const game = document.getElementById("game");

function drop(){
    if(locked) return;

    const el = document.createElement("div");
    el.className = "drop";
    el.innerText = "💖";

    el.style.left = Math.random()*100+"vw";
    el.style.animationDuration = (3+Math.random()*3)+"s";

    el.onclick = (e)=>{
        e.stopPropagation(); // 💥 ВАЖНО: не даём клику “пройти дальше”
        score++;
        document.getElementById("score").innerText = score;
        el.remove();
    };

    game.appendChild(el);
    setTimeout(()=>el.remove(),6000);
}

setInterval(drop,700);

/* 📩 уведомление */
setTimeout(()=>{
    document.getElementById("notify").classList.add("show");
},10000);

/* 💥 ОТКРЫТИЕ ТОЛЬКО ОТСЮДА */
document.getElementById("notify").onclick = (e)=>{
    e.stopPropagation();

    if(locked) return;
    locked = true; // 🚫 блокируем игру полностью

    game.style.pointerEvents = "none";
    game.style.opacity = "0";

    document.querySelector(".game-text").style.display = "none";
    document.querySelector(".score").style.display = "none";

    document.getElementById("notify").style.display = "none";
    document.getElementById("chat").style.display = "flex";

    sendMessages();
};

</script>
