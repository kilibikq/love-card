<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>💙</title>

<style>
html, body {
    margin:0;
    height:100%;
    background:#0e1621;
    font-family:Arial;
    overflow:hidden;
    color:white;
}

/* 🎮 ИГРА */
.game {
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:1;
}

.game-text {
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:#7aa2c0;
    z-index:2;
    pointer-events:none;
}

.score {
    position:fixed;
    top:15px;
    left:15px;
    z-index:2;
}

.drop {
    position:absolute;
    font-size:34px;
    user-select:none;
    cursor:pointer;
    touch-action:manipulation;
    z-index:9999;
}

/* 📩 уведомление */
.notify {
    position:fixed;
    top:-120px;
    left:0;
    right:0;
    margin:auto;
    width:90%;
    max-width:420px;
    background:#1f1f1f;
    border-radius:12px;
    padding:12px;
    transition:0.5s;
    z-index:999;
}

.notify.show { top:10px; }

/* 💬 ЧАТ */
.chat {
    display:none;
    flex-direction:column;
    height:100vh;
}

.topbar {
    height:60px;
    background:#17212b;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:0 15px;
}

.title { font-weight:bold; }
.status { font-size:12px; color:#7aa2c0; }

.messages {
    flex:1;
    padding:15px;
    padding-bottom:90px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
}

.msg {
    background:#2b5278;
    padding:9px 12px;
    border-radius:14px;
    max-width:75%;
    font-size:14px;
    margin-top:8px;
    opacity:0;
    transform:translateY(8px);
    transition:0.35s;
}

.msg.show {
    opacity:1;
    transform:translateY(0);
}

/* 🔘 кнопка */
.next-btn {
    display:none;
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#2b5278;
    padding:10px 18px;
    border-radius:20px;
    font-size:14px;
    cursor:pointer;
    z-index:1000;
}

/* 🌙 */
.fade {
    position:fixed;
    inset:0;
    background:black;
    opacity:0;
    transition:1.5s;
    z-index:50;
}

/* ❤️ финал */
.final {
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:black;
    z-index:60;
}

.heart {
    font-size:90px;
    opacity:0;
    transform:scale(0.6);
    transition:1s;
    animation:pulse 1.2s infinite;
}

@keyframes pulse {
    0% { transform:scale(1); }
    50% { transform:scale(1.15); }
    100% { transform:scale(1); }
}

.text {
    position:absolute;
    font-size:22px;
    opacity:0;
    transition:1s;
}

.top { top:25%; }
.bottom { bottom:25%; }

.show { opacity:1 !important; }

</style>
</head>

<body>

<!-- 🎮 -->
<div class="score">💖: <span id="score">0</span></div>
<div class="game" id="game"></div>
<div class="game-text">нажимай на сердечки 💖</div>

<!-- 📩 -->
<div class="notify" id="notify">Telegram — новое сообщение 💌</div>

<!-- 💬 -->
<div class="chat" id="chat">
    <div class="topbar">
        <div class="title">Darling❤️</div>
        <div class="status" id="status">в сети</div>
    </div>
    <div class="messages" id="messages"></div>
</div>

<!-- 🔘 -->
<div class="next-btn" id="nextBtn">Далее</div>

<!-- 🌙 -->
<div class="fade" id="fade"></div>

<!-- ❤️ -->
<div class="final" id="final">
    <div class="text top" id="top">С днём рождения</div>
    <div class="heart">❤️</div>
    <div class="text bottom" id="bottom">Любимая</div>
</div>

<script>

let score = 0;
let locked = false;

const game = document.getElementById("game");
const notify = document.getElementById("notify");
const chat = document.getElementById("chat");
const messages = document.getElementById("messages");
const status = document.getElementById("status");
const nextBtn = document.getElementById("nextBtn");

/* 💖 ИГРА (100% РАБОТАЕТ) */
function spawn() {
    if (locked) return;

    const el = document.createElement("div");
    el.className = "drop";
    el.innerText = "💖";

    const x = Math.random() * (window.innerWidth - 40);
    let y = -40;

    el.style.left = x + "px";
    el.style.top = y + "px";

    game.appendChild(el);

    const speed = 2 + Math.random() * 2;

    function move() {
        if (locked) {
            el.remove();
            return;
        }

        y += speed;
        el.style.top = y + "px";

        if (y > window.innerHeight) {
            el.remove();
            return;
        }

        requestAnimationFrame(move);
    }

    move();

    const hit = () => {
        score++;
        document.getElementById("score").innerText = score;
        el.remove();
    };

    el.addEventListener("click", hit);
    el.addEventListener("touchstart", hit);
}

setInterval(spawn, 450);

/* 📩 */
setTimeout(() => notify.classList.add("show"), 8000);

/* 💥 старт */
notify.onclick = () => {
    locked = true;

    game.style.display = "none";
    document.querySelector(".game-text").style.display = "none";
    document.querySelector(".score").style.display = "none";
    notify.style.display = "none";

    chat.style.display = "flex";

    startChat();
};

/* 💬 ПОЛНОЕ ПОЗДРАВЛЕНИЕ */
const msgs = [
"Лерочка.. 💙",
"Слушай… сегодня твой день ✨",
"Я не буду пытаться сказать что-то идеальное",
"Я просто рад, что ты есть в моей жизни 🥰",
"Ты очень особенная 💖",
"И я хочу, чтобы ты была счастлива ❤️",
"Сегодня и всегда 💙"
];

let i = 0;

function startChat() {
    function next() {
        if (i >= msgs.length) {
            nextBtn.style.display = "block";
            return;
        }

        status.innerText = "печатает…";

        setTimeout(() => {
            status.innerText = "в сети";

            const d = document.createElement("div");
            d.className = "msg";
            d.innerText = msgs[i];

            messages.appendChild(d);
            setTimeout(() => d.classList.add("show"), 50);

            messages.scrollTop = messages.scrollHeight;

            i++;
            setTimeout(next, 900);

        }, 1200);
    }

    next();
}

/* 🔘 далее */
nextBtn.onclick = () => {
    nextBtn.style.display = "none";

    document.getElementById("fade").classList.add("show");

    setTimeout(() => {
        document.getElementById("final").style.display = "flex";
    }, 1500);

    setTimeout(() => {
        document.getElementById("top").classList.add("show");
    }, 2200);

    setTimeout(() => {
        document.getElementById("bottom").classList.add("show");
    }, 3000);
};

</script>

</body>
</html>
