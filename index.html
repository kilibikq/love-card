<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>💌</title>

<style>
html, body {
    margin:0;
    height:100%;
    background:#0e1621;
    font-family:Arial;
    overflow:hidden;
    color:white;
}

/* 🎮 */
.game {
    position:fixed;
    inset:0;
    z-index:1;
}

.game-text {
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:#7aa2c0;
}

.score {
    position:fixed;
    top:15px;
    left:15px;
    z-index:5;
}

/* 💖 */
.drop {
    position:absolute;
    font-size:30px;
    cursor:pointer;
    z-index:10;
    animation:fall linear forwards;
}

@keyframes fall {
    from { transform:translateY(-50px); }
    to { transform:translateY(110vh); }
}

/* 📩 */
.notify {
    position:fixed;
    top:-100px;
    left:0;
    right:0;
    margin:auto;
    width:90%;
    max-width:420px;
    background:#1f1f1f;
    border-radius:12px;
    padding:12px;
    transition:0.5s;
    z-index:999;
}

.notify.show { top:10px; }

/* 💬 */
.chat {
    display:none;
    flex-direction:column;
    height:100vh;
}

.topbar {
    height:60px;
    background:#17212b;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:0 15px;
}

.title { font-weight:bold; }
.status { font-size:12px; color:#7aa2c0; }

.messages {
    flex:1;
    padding:15px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
}

.msg {
    background:#2b5278;
    padding:8px 12px;
    border-radius:14px;
    max-width:75%;
    font-size:14px;
    margin-top:8px;
    opacity:0;
    transform:translateY(8px);
    transition:0.35s;
}

.msg.show {
    opacity:1;
    transform:translateY(0);
}

/* 🔘 */
.next-btn {
    display:none;
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#2b5278;
    padding:10px 18px;
    border-radius:20px;
    font-size:14px;
    cursor:pointer;
    z-index:1000;
}

/* 🌙 */
.fade {
    position:fixed;
    inset:0;
    background:black;
    opacity:0;
    transition:1.5s;
    z-index:50;
}

/* ❤️ */
.final {
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:black;
    z-index:60;
}

.heart {
    font-size:90px;
    opacity:0;
    transform:scale(0.6);
    transition:1s;
    animation:pulse 1.2s infinite;
}

@keyframes pulse {
    0% { transform:scale(1); }
    50% { transform:scale(1.15); }
    100% { transform:scale(1); }
}

.text {
    position:absolute;
    font-size:22px;
    opacity:0;
    transition:1s;
}

.top { top:25%; }
.bottom { bottom:25%; }

.show { opacity:1 !important; }

</style>
</head>

<body>

<div class="score">💖: <span id="score">0</span></div>
<div class="game" id="game"></div>
<div class="game-text">нажимай на сердечки 💖</div>

<div class="notify" id="notify">Telegram — новое сообщение 💌</div>

<div class="chat" id="chat">
    <div class="topbar">
        <div class="title">Darling❤️</div>
        <div class="status" id="status">в сети</div>
    </div>
    <div class="messages" id="messages"></div>
</div>

<div class="next-btn" id="nextBtn">Далее</div>

<div class="fade" id="fade"></div>

<div class="final" id="final">
    <div class="text top" id="top">С днём рождения</div>
    <div class="heart" id="heart">❤️</div>
    <div class="text bottom" id="bottom">Любимая</div>
</div>

<script>

let locked=false;
let score=0;

const game=document.getElementById("game");
const notify=document.getElementById("notify");
const chat=document.getElementById("chat");
const messages=document.getElementById("messages");
const status=document.getElementById("status");
const nextBtn=document.getElementById("nextBtn");

/* 🎮 */
function spawn(){
if(locked) return;

const el=document.createElement("div");
el.className="drop";
el.innerText="💖";

el.style.left=Math.random()*100+"vw";
el.style.animationDuration=(3+Math.random()*2)+"s";

let clicked=false;

const hit=(e)=>{
e.preventDefault();
e.stopPropagation();

if(clicked || locked) return;
clicked=true;

score++;
document.getElementById("score").innerText=score;

el.remove();
};

el.addEventListener("pointerdown", hit);

game.appendChild(el);

setTimeout(()=>{
if(el && !clicked){
el.style.opacity="0";
el.style.transition="0.3s";
setTimeout(()=>el.remove(),300);
}
},6500);
}

setInterval(spawn,600);

/* 📩 */
setTimeout(()=>notify.classList.add("show"),8000);

/* 💥 старт */
notify.onclick=()=>{
if(locked) return;
locked=true;

game.style.display="none";
document.querySelector(".game-text").style.display="none";
document.querySelector(".score").style.display="none";
notify.style.display="none";

chat.style.display="flex";

startChat();
};

/* 💬 ОБНОВЛЁННЫЙ ТЕКСТ */
let i=0;

const msgs=[
"Лерочка…",
"Слушай… сегодня твой день ✨",
"Я не буду пытаться сказать что-то идеальное — да и, честно, это сейчас не главное",
"Я просто рад, что ты есть в моей жизни… правда 🥰",
"Ты для меня очень особенная. Даже если я не всегда умею это нормально показать.",
"И знаешь… я правда хочу, чтобы у тебя было больше спокойных дней.",
"Таких, где тебе легко, где ты просто улыбаешься ни с чего 💕",
"И чтобы ты меньше сомневалась в себе — ты намного лучше, чем иногда думаешь 🌸",
"И если совсем честно… я просто хочу, чтобы ты была счастлива. По-настоящему.",
"Сегодня. И всегда.",
"С днём рождения тебя 🎂",
"И несмотря ни на что — знай, я рядом ❤️"
];

function startChat(){

function next(){

if(i>=msgs.length){
nextBtn.style.display="block";
return;
}

status.innerText="печатает…";

setTimeout(()=>{

status.innerText="в сети";

const d=document.createElement("div");
d.className="msg";
d.innerText=msgs[i];

messages.appendChild(d);
setTimeout(()=>d.classList.add("show"),50);

messages.scrollTop=messages.scrollHeight;

i++;
setTimeout(next,900);

},1200);

}

next();
}

/* 🔘 */
nextBtn.onclick=()=>{

document.getElementById("fade").classList.add("show");

setTimeout(()=>{
document.getElementById("final").style.display="flex";
},1500);

setTimeout(()=>{
document.getElementById("top").classList.add("show");
},2200);

setTimeout(()=>{
document.getElementById("bottom").classList.add("show");
},3000);

};

</script>

</body>
</html>
